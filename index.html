// f2_m (mascota) activada por defecto
const DEFAULT = new Set(['f1_0','f1_1','f1_2','f1_3','f1_4','f2_1','f2_pap','f2_m','m_base','f2_f']);

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fCLP = (n) => '$' + Math.round(n || 0).toLocaleString('es-CL').replace(/,/g,'.');
const unitPrice = (item) => item.price !== undefined ? item.price : item.hours * BASE_RATE;
const lineTotal = (item, qty=1) => unitPrice(item) * qty;

// ─── RADAR CHART ──────────────────────────────────────────────────────────────
function RadarChart({ data }) {
  const N=data.length, R=68, C=100, step=(Math.PI*2)/N;
  const path=(vals)=>vals.map((v,i)=>{
    const r=(v/10)*R;
    return `${i===0?'M':'L'} ${C+r*Math.sin(i*step)} ${C-r*Math.cos(i*step)}`;
  }).join(' ')+'Z';
  return (
    <svg viewBox="0 0 200 200" className="w-full max-w-[260px] mx-auto">
      {[.2,.4,.6,.8,1].map((p,i)=><circle key={i} cx={C} cy={C} r={R*p} stroke="#E5E7EB" strokeWidth="1" fill="none"/>)}
      {data.map((_,i)=><line key={i} x1={C} y1={C} x2={C+R*Math.sin(i*step)} y2={C-R*Math.cos(i*step)} stroke="#E5E7EB" strokeWidth="1"/>)}
      <path d={path(data.map(d=>d.c))} fill="#9CA3AF" fillOpacity=".15" stroke="#9CA3AF" strokeWidth="1.5"/>
      <path d={path(data.map(d=>d.p))} fill="#00D64F" fillOpacity=".2" stroke="#00D64F" strokeWidth="2.5"/>
      {data.map((d,i)=>(
        <text key={i} x={C+(R+26)*Math.sin(i*step)} y={C-(R+18)*Math.cos(i*step)}
          textAnchor="middle" fill="#6B7280" fontSize="7.5" fontWeight="bold" fontFamily="Space Mono" letterSpacing="0.5">
          {d.axis}
        </text>
      ))}
    </svg>
  );
}

// ─── COPY BUTTON ──────────────────────────────────────────────────────────────
function CopyBtn({ text, dark=false }) {
  const [ok, setOk] = useState(false);
  const copy = () => {
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el);
    setOk(true); setTimeout(()=>setOk(false), 2000);
  };
  return (
    <button onClick={copy}
      className="ml-2 text-[9px] font-mono font-bold uppercase tracking-widest px-1.5 py-0.5 rounded transition-all"
      style={{ background: ok ? '#00D64F' : dark ? '#27272a' : '#e4e4e7', color: ok ? '#000' : dark ? '#71717a' : '#52525b' }}>
      {ok ? '✓' : 'copiar'}
    </button>
  );
}

    setSelected(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  }, []);

  const setQty = useCallback((id, delta) => {
    setQtys(prev => ({ ...prev, [id]: Math.max(1, (prev[id]||1)+delta) }));
    setSelected(prev => { const n=new Set(prev); n.add(id); return n; });
  }, []);

  const togglePhase = useCallback((id) => {
    setExpanded(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  }, []);

  const calc = useMemo(() => {
    let raw=0; const lines=[];
    PHASES.forEach(p=>p.items.forEach(i=>{
      if(selected.has(i.id)){
        const qty=qtys[i.id]||1, price=lineTotal(i,qty);
        raw+=price;
        if(price>0) lines.push({ name:i.name+(qty>1?` ×${qty}`:''), price });
      }
    }));
    const discount = Math.round((raw*DISCOUNT)/1000)*1000;
    const net      = raw - discount;
    const gross    = Math.round((net/(1-TAX_RATE))/100)*100;
    const tax      = gross - net;
    return { raw, discount, net, gross, tax, lines, count:selected.size };
  }, [selected, qtys]);

  const abono50 = Math.round((calc.gross*.5)/1000)*1000;
  const abono30 = Math.round((calc.gross*.3)/1000)*1000;
  const abonoInicial = plan==='01' ? abono50 : abono30;

    if (approved && checkoutRef.current)

      const el = document.getElementById('pdf-master');
      const canvas = await html2canvas(el, { scale:2.5, useCORS:true, backgroundColor:'#fff', logging:false, windowWidth:800 });

      const pdf = new jspdf.jsPDF('p','mm','a4');
      const w=210, h=(canvas.height*w)/canvas.width;
      pdf.addImage(img,'PNG',0,0,w,h,undefined,'FAST');

      : `Hola Javiera, tengo una consulta sobre la propuesta de Queenchis. ¿Podemos conversar?`;
    window.open(`https://wa.me/56949873116?text=${encodeURIComponent(msg)}`,'_blank');
  };

  // ── PDF MASTER (oculto) ───────────────────────────────────────────────────

    <div id="pdf-master" aria-hidden="true">

        <div>
          <div style={{fontSize:52,fontWeight:900,letterSpacing:'-2px',lineHeight:1}}>OPEN CLUB</div>
          <div style={{fontFamily:'Space Mono',fontSize:11,opacity:.45,marginTop:6,textTransform:'uppercase',letterSpacing:'2px'}}>Visual Infrastructure Studio</div>
        </div>
        <div style={{textAlign:'right',fontFamily:'Space Mono',fontSize:11,opacity:.55,lineHeight:2,textTransform:'uppercase'}}>
